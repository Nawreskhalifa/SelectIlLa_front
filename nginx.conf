server {
  listen 80;

  sendfile on;
  default_type application/octet-stream;

  gzip on;
  gzip_http_version 1.1;
  gzip_disable "MSIE [1-6]\.";
  gzip_min_length 256;
  gzip_vary on;
  gzip_proxied expired no-cache no-store private auth;
  gzip_types text/plain text/css application/json application/javascript application/xml application/xml+rss text/javascript;
  gzip_comp_level 9;

  root /usr/share/nginx/html;

  # FRONTEND (SPA)
  location / {
    try_files $uri $uri/ /index.html;
  }

  # STRAPI API
  location /api/ {
    proxy_pass http://backend-service:1337/api/;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  # STRAPI ADMIN
  location /admin/ {
    proxy_pass http://backend-service:1337/admin/;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  # UPLOADS
  location /uploads/ {
    proxy_pass http://backend-service:1337/uploads/;
  }
}